name: Flutter CI

# প্রতিটি Push এবং Pull Request-এ এই পাইপলাইনটি রান করবে
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  compatibility_and_test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. লিনাক্স এনভায়রনমেন্টে জাভা সেটআপ করা (অ্যান্ড্রয়েড বিল্ড সাপোর্টের জন্য প্রয়োজনীয়)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. ফ্ল্যাটার এনভায়রনমেন্ট সেটআপ করা
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # আপনি চাইলে নির্দিষ্ট ভার্সনও উল্লেখ করতে পারেন (যেমন: flutter-version: '3.x.x')
          cache: true       # প্রতিবার দ্রুত রান হওয়ার জন্য ডিপেন্ডেন্সি ক্যাশ করবে

      # ৪. প্রজেক্টের সমস্ত প্যাকেজ/ডিপেন্ডেন্সি ডাউনলোড করা
      - name: Install Dependencies
        run: flutter pub get

      # ৫. কোডের ফরম্যাটিং ঠিক আছে কিনা পরীক্ষা করা (Code Formatting)
      - name: Check Formatting
        run: flutter format --set-exit-if-changed .

      # ৬. স্ট্যাটিক অ্যানালাইসিস রান করা (Flutter Analyze)
      - name: Analyze Code
        run: flutter analyze

      # ৭. সমস্ত ইউনিট এবং উইজেট টেস্ট রান করা (Flutter Test)
      - name: Run Tests
        run: flutter test
        
